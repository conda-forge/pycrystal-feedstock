{% set name = "pycrystal" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pycrystal-{{ version }}.tar.gz
  sha256: 6d39033dc01b461d9646d2caf140f28ed99a818c6cdd5c5f93e9f8ec61acca35

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - ase
    - pyparsing
    - requests
    - bs4

test:
  imports:
    - pycrystal
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tilde-lab/pycrystal
  summary: Utilities for ab initio modeling suite CRYSTAL
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
